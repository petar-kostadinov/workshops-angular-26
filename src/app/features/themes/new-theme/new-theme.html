<div class="container">
    <div class="new-theme-border">
        <div class="header-background">
            <span>New Theme</span>
        </div>
        <form (ngSubmit)="onSubmit()">
            <div class="new-theme-title">
                <label for="themeName">Title <span class="red">*</span></label>
                <input type="text" name="themeName" id="themeName" [(ngModel)]="themeName" />
            </div>
            <div class="new-theme-content">
                <label for="postText">Post <span class="red">*</span></label>
                <textarea type="text" name="postText" id="postText" rows="8" class="height"
                    [(ngModel)]="postText"></textarea>
            </div>
            <div class="new-theme-buttons">
                <button type="button" class="cancel" (click)="onCancel()">Cancel</button>
                <button type="submit" class="public">Post</button>
            </div>

        </form>
    </div>
</div>
